server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the backend service.
    # BACKEND_URL is substituted at container startup via envsubst
    # (set to http://backend:8080 locally, internal ALB on AWS).
    location /api {
        proxy_pass ${BACKEND_URL};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Angular routing — fallback to index.html for client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
