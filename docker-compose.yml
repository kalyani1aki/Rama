services:
  backend:
    build: ./rama-backend
    container_name: rama-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - rama-data:/root

  frontend:
    build: ./rama-frontend
    container_name: rama-frontend
    restart: unless-stopped
    ports:
      - "4200:80"
    environment:
      BACKEND_URL: http://backend:8080
    depends_on:
      - backend

volumes:
  rama-data:
