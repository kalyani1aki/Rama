spring.application.name=rama-backend
server.port=8080

# H2 embedded database (file mode — data persists across restarts)
spring.datasource.url=jdbc:h2:file:${user.home}/ramadb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Comma-separated list of admin emails
app.admin.emails=admin@rama.com

# Actuator — expose the health endpoint for ALB health checks
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Enable H2 console for debugging (accessible at /h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console